server:
  port: 8083

spring:
  application:
    name: payments-service

  datasource:
    url: jdbc:postgresql://localhost:5432/payments_db
    username: postgres
    password: postgres
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  kafka:
    bootstrap-servers: localhost:9092
    consumer:
      group-id: payments-group
      auto-offset-reset: earliest